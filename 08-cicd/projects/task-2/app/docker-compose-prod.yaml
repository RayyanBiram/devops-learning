volumes: 
  redis-data:

services:
  web:
    image: rayyanbiram/flask-redis-nginx:latest
    depends_on:
      - redisdb
    environment:
      REDIS_HOST: redisdb
      REDIS_PORT: 6379

  redisdb:
    image: redis
    volumes: 
      - redis-data:/data

  nginx:
    image: nginx
    ports:
      - "80:80"
    depends_on:
      - web
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro

